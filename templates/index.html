<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Doctor Hiroki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a2e, #1a1040, #0d1b3e);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(20, 15, 50, 0.9);
            padding: 16px 24px;
            text-align: center;
            border-bottom: 1px solid #2a2a5a;
        }
        .header h1 { color: #a78bfa; font-size: 22px; }
        .header p { color: #7c7c9a; font-size: 13px; margin-top: 4px; }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
            white-space: pre-line;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: #6d28d9;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background: #1e1b4b;
            border: 1px solid #312e81;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.bot .name {
            font-size: 12px;
            color: #a78bfa;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .typing { color: #7c7c9a; padding: 4px 24px; font-size: 13px; min-height: 24px; }
        .input-area {
            background: rgba(20, 15, 50, 0.9);
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2a2a5a;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            font-size: 15px;
            border: 2px solid #312e81;
            border-radius: 24px;
            background: #0f0e2a;
            color: #e0e0e0;
            outline: none;
        }
        .input-area input:focus { border-color: #6d28d9; }
        .input-area button {
            padding: 14px 28px;
            background: #6d28d9;
            color: #fff;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
        }
        .input-area button:hover { background: #5b21b6; }
        .input-area button:disabled { background: #3b3b6b; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sleep Doctor Hiroki</h1>
        <p>睡眠の悩み、何でもご相談ください</p>
    </div>
    <div id="messages"></div>
    <div class="typing" id="typing"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="睡眠のお悩みを入力..." autofocus>
        <button id="send-btn" onclick="send()">送信</button>
    </div>
    <script>
        window.onload = function() {
            addBot('こんにちは！Sleep Doctor Hiroki です。\n睡眠に関するお悩みがあれば、何でもお話しください。\n\n例えば「眠れない」「夜中に目が覚める」「日中眠い」など、あなたの症状を教えてください。');
        };
        function addBot(text) {
            var c = document.getElementById('messages');
            var d = document.createElement('div');
            d.className = 'message bot';
            d.innerHTML = '<div class="name">Dr. Hiroki</div>' + escapeHtml(text);
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }
        function addUser(text) {
            var c = document.getElementById('messages');
            var d = document.createElement('div');
            d.className = 'message user';
            d.textContent = text;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }
        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        }
        function send() {
            var input = document.getElementById('input');
            var text = input.value.trim();
            if (!text) return;
            addUser(text);
            input.value = '';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('typing').textContent = 'Dr. Hiroki が考えています...';
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('typing').textContent = '';
                document.getElementById('send-btn').disabled = false;
                addBot(data.response);
                input.focus();
            })
            .catch(function() {
                document.getElementById('typing').textContent = '';
                document.getElementById('send-btn').disabled = false;
                addBot('すみません、エラーが発生しました。もう一度お試しください。');
            });
        }
        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
