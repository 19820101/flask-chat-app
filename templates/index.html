<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f23, #1a1a3e);
        }
        .login-box {
            background: #1e1e3a;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-box h1 { font-size: 28px; margin-bottom: 8px; color: #7c7cff; }
        .login-box p { color: #888; margin-bottom: 24px; }
        .login-box input {
            padding: 12px 16px; font-size: 16px; border: 2px solid #333;
            border-radius: 8px; background: #12122a; color: #e0e0e0;
            width: 260px; outline: none;
        }
        .login-box input:focus { border-color: #7c7cff; }
        .login-box button {
            margin-top: 16px; padding: 12px 32px; font-size: 16px;
            background: #7c7cff; color: #fff; border: none; border-radius: 8px;
            cursor: pointer; display: block; width: 100%;
        }
        .login-box button:hover { background: #6a6aee; }
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        .header {
            background: #1e1e3a; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #2a2a4a;
        }
        .header h2 { color: #7c7cff; font-size: 20px; }
        .header span { color: #888; font-size: 14px; }
        #messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .message { max-width: 70%; padding: 10px 16px; border-radius: 12px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.mine { background: #7c7cff; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.others { background: #2a2a4a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message .meta { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .message .text { font-size: 15px; line-height: 1.4; }
        #typing-indicator { padding: 4px 24px; font-size: 13px; color: #666; min-height: 24px; }
        .input-area {
            background: #1e1e3a; padding: 16px 20px;
            display: flex; gap: 12px; border-top: 1px solid #2a2a4a;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; font-size: 15px; border: 2px solid #333;
            border-radius: 24px; background: #12122a; color: #e0e0e0; outline: none;
        }
        .input-area input:focus { border-color: #7c7cff; }
        .input-area button {
            padding: 12px 24px; background: #7c7cff; color: #fff; border: none;
            border-radius: 24px; cursor: pointer; font-size: 15px;
        }
        .input-area button:hover { background: #6a6aee; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>Flask Chat</h1>
            <p>ニックネームを入力して参加</p>
            <input type="text" id="username-input" placeholder="ニックネーム" maxlength="20" autofocus>
            <button onclick="joinChat()">チャットに参加</button>
        </div>
    </div>
    <div id="chat-screen">
        <div class="header">
            <h2>Flask Chat</h2>
            <span id="user-display"></span>
        </div>
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="メッセージを入力..." autofocus>
            <button onclick="sendMessage()">送信</button>
        </div>
    </div>
    <script>
        let username = '';
        let socket = null;
        let typingTimeout = null;
        function joinChat() {
            const input = document.getElementById('username-input');
            username = input.value.trim();
            if (!username) return;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('user-display').textContent = username;
            socket = io();
            socket.on('message', (data) => { addMessage(data); });
            socket.on('user_typing', (data) => {
                const indicator = document.getElementById('typing-indicator');
                indicator.textContent = data.username + ' が入力中...';
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { indicator.textContent = ''; }, 2000);
            });
            document.getElementById('message-input').focus();
        }
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !socket) return;
            socket.emit('send_message', { username, text });
            input.value = '';
            input.focus();
        }
        function addMessage(data) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const isMine = data.username === username;
            div.className = 'message ' + (isMine ? 'mine' : 'others');
            div.innerHTML = '<div class="meta">' + (isMine ? '' : data.username + ' · ') + data.timestamp + '</div><div class="text">' + escapeHtml(data.text) + '</div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { if (!socket) joinChat(); else sendMessage(); }
        });
        document.addEventListener('input', (e) => {
            if (e.target.id === 'message-input' && socket) { socket.emit('typing', { username }); }
        });
    </script>
</body>
</html>
