<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Doctor Hiroki</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#333;height:100vh;display:flex;flex-direction:column}
        .header{background:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:10}
        .header img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid #4a90d9}
        .header-text h1{color:#2c3e6b;font-size:20px}
        .header-text p{color:#7a8ba6;font-size:12px}
        .disclaimer{background:#fff3cd;color:#856404;padding:8px 24px;font-size:11px;text-align:center;border-bottom:1px solid #ffc107}
        #messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
        .message{max-width:80%;padding:14px 18px;border-radius:16px;font-size:15px;line-height:1.7;animation:fadeIn 0.4s ease;white-space:pre-line}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{background:#4a90d9;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
        .message.bot{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.08);display:flex;gap:10px;align-items:flex-start}
        .message.bot img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px}
        .message.bot .text{flex:1}
        .typing{padding:4px 24px;font-size:13px;color:#7a8ba6;min-height:24px}
        .input-area{background:#fff;padding:16px 20px;display:flex;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,0.05)}
        .input-area input{flex:1;padding:14px 18px;font-size:15px;border:2px solid #e0e7ef;border-radius:24px;background:#f8fafc;color:#333;outline:none}
        .input-area input:focus{border-color:#4a90d9}
        .input-area button{padding:14px 28px;background:#4a90d9;color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:15px}
        .input-area button:hover{background:#3a7bc8}
        .input-area button:disabled{background:#b0c4de;cursor:not-allowed}
    </style>
</head>
<body>
    <div class="header">
        <img src="/doctor.jpg" alt="Dr. Hiroki">
        <div class="header-text">
            <h1>Sleep Doctor Hiroki</h1>
            <p>睡眠専門アドバイザー・上田泰己</p>
        </div>
    </div>
    <div class="disclaimer">本サービスは一般的な睡眠情報の提供を目的としており、医療上の助言・診断・治療を行うものではありません。</div>
    <div id="messages"></div>
    <div class="typing" id="typing"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="睡眠のお悩みをお聞かせください..." autofocus>
        <button id="send-btn" onclick="send()">相談する</button>
    </div>
    <script>
        var sid='s'+Math.random().toString(36).substr(2,9);
        window.onload=function(){addBot('はじめまして。Sleep Doctor Hiroki です。\n睡眠でお困りのことはありますか？\n\n眠れない、夜中に目が覚める、日中の眠気など、どんなことでもお気軽にご相談ください。')};
        function addBot(text){var c=document.getElementById('messages');var d=document.createElement('div');d.className='message bot';d.innerHTML='<img src="/doctor.jpg" alt="Dr."><div class="text">'+escapeHtml(text)+'</div>';c.appendChild(d);c.scrollTop=c.scrollHeight}
        function addUser(text){var c=document.getElementById('messages');var d=document.createElement('div');d.className='message user';d.textContent=text;c.appendChild(d);c.scrollTop=c.scrollHeight}
        function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
        function send(){var input=document.getElementById('input');var text=input.value.trim();if(!text)return;addUser(text);input.value='';document.getElementById('send-btn').disabled=true;document.getElementById('typing').textContent='Dr. Hiroki が考えています...';fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:sid})}).then(function(r){return r.json()}).then(function(data){document.getElementById('typing').textContent='';document.getElementById('send-btn').disabled=false;addBot(data.response);input.focus()}).catch(function(){document.getElementById('typing').textContent='';document.getElementById('send-btn').disabled=false;addBot('すみません、エラーが発生しました。もう一度お試しください。')})}
        document.getElementById('input').addEventListener('keydown',function(e){if(e.key==='Enter')send()});
    </script>
</body>
</html>
